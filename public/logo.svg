<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="top-text-path" d="M 40,100 A 60,60 0 0,1 160,100" />
    <path id="bottom-text-path" d="M 40,100 A 60,60 0 0,0 160,100" />
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#1e3a8a" stroke-width="8" />
  <circle cx="100" cy="100" r="82" fill="none" stroke="#3b82f6" stroke-width="1" />
  
  <!-- Center graphic placeholder (Unity Circle of Hands) -->
  <g transform="translate(100, 100)" fill="#1e3a8a">
    <circle r="40" fill="none" stroke="#1e3a8a" stroke-width="2" />
    <!-- Simplified Unity Logo (5 interconnected arcs) -->
    <path d="M 0,-30 A 30,30 0 0,1 28.5,-9 M 28.5,-9 A 30,30 0 0,1 17.6,24.3 M 17.6,24.3 A 30,30 0 0,1 -17.6,24.3 M -17.6,24.3 A 30,30 0 0,1 -28.5,-9 M -28.5,-9 A 30,30 0 0,1 0,-30" fill="none" stroke="#1e3a8a" stroke-width="4" stroke-linecap="round" />
    <text y="5" text-anchor="middle" font-size="8" font-weight="bold" font-family="sans-serif">স্থাপিত ২০২৪</text>
  </g>

  <!-- Text on paths -->
  <text font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e3a8a">
    <textPath href="#top-text-path" startOffset="50%" text-anchor="middle">আমার গ্রাম আমার দেশ</textPath>
  </text>
  
  <text font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e3a8a">
    <textPath href="#bottom-text-path" startOffset="50%" text-anchor="middle" side="right">কাহেনা যুব সংগঠন</textPath>
  </text>
</svg>
